<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USDC Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #0f172a;
      color: #ffffff;
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 20px 0;
      font-size: 28px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .card {
      background: #111827;
      border-radius: 12px;
      padding: 16px;
    }

    .label {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .sub {
      margin-top: 6px;
      font-size: 13px;
      color: #94a3b8;
    }

    .panel {
      background: #111827;
      border-radius: 12px;
      padding: 16px;
    }

    .footer {
      margin-top: 12px;
      color: #94a3b8;
      font-size: 13px;
    }

    .error {
      margin-top: 16px;
      color: #fca5a5;
      white-space: pre-wrap;
    }

    canvas {
      margin-top: 10px;
      background: #111827;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>USDC 유동성 + 월말 예측</h1>

    <div class="cards">
      <div class="card">
        <div class="label">현재 시가총액</div>
        <div class="value" id="current">-</div>
        <div class="sub">USDC market cap</div>
      </div>

      <div class="card">
        <div class="label">최근 7일 일평균 증가</div>
        <div class="value" id="avg">-</div>
        <div class="sub">최근 7일 기준</div>
      </div>

      <div class="card">
        <div class="label">월말 예상 시가총액</div>
        <div class="value" id="proj">-</div>
        <div class="sub">단순 선형 추정</div>
      </div>
    </div>

    <div class="panel">
      <canvas id="chart"></canvas>
      <div class="footer" id="status">불러오는 중...</div>
      <div class="error" id="error"></div>
    </div>
  </div>

  <script>
    const LOOKBACK = 7;
    let chart = null;

    function formatBillions(n) {
      return (n / 1e9).toFixed(2) + "B";
    }

    function formatMillions(n) {
      const sign = n >= 0 ? "+" : "";
      return sign + (n / 1e6).toFixed(2) + "M";
    }

    function monthDay(ts) {
      const d = new Date(ts);
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    async function loadData() {
      const errorEl = document.getElementById("error");
      const statusEl = document.getElementById("status");
      errorEl.textContent = "";
      statusEl.textContent = "불러오는 중...";

      try {
        const res = await fetch("/api/usdc", {
          headers: {
            "Accept": "application/json"
          }
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(`API 오류: ${res.status}\n${text}`);
        }

        const json = await res.json();

        if (!json || !json.data || !Array.isArray(json.data) || json.data.length === 0) {
          throw new Error("응답 데이터가 비어 있습니다.");
        }

        const values = json.data.map(item => Number(item.marketCapUsd));
        const labels = json.data.map(item => monthDay(item.time));

        if (values.length < LOOKBACK + 1) {
          throw new Error("분석에 필요한 데이터가 부족합니다.");
        }

        const current = values[values.length - 1];
        const avg = (current - values[values.length - LOOKBACK - 1]) / LOOKBACK;

        const today = new Date();
        const endOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0);
        const remainDays = Math.max(
          0,
          Math.ceil((endOfMonth - today) / (1000 * 60 * 60 * 24))
        );

        const projection = current + avg * remainDays;

        document.getElementById("current").textContent = formatBillions(current);
        document.getElementById("avg").textContent = formatMillions(avg);
        document.getElementById("proj").textContent = formatBillions(projection);

        if (chart) {
          chart.destroy();
        }

        chart = new Chart(document.getElementById("chart"), {
          type: "line",
          data: {
            labels: [...labels, "월말예상"],
            datasets: [
              {
                label: "Actual (B)",
                data: [...values.map(v => v / 1e9), null],
                borderWidth: 2,
                tension: 0.2
              },
              {
                label: "Projection (B)",
                data: [
                  ...Array(values.length - 1).fill(null),
                  values[values.length - 1] / 1e9,
                  projection / 1e9
                ],
                borderWidth: 2,
                borderDash: [6, 6],
                tension: 0
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: {
                labels: {
                  color: "#ffffff"
                }
              }
            },
            scales: {
              x: {
                ticks: {
                  color: "#ffffff"
                },
                grid: {
                  color: "rgba(255,255,255,0.08)"
                }
              },
              y: {
                ticks: {
                  color: "#ffffff"
                },
                grid: {
                  color: "rgba(255,255,255,0.08)"
                }
              }
            }
          }
        });

        statusEl.textContent = `마지막 갱신: ${new Date().toLocaleString("ko-KR")}`;
      } catch (error) {
        console.error(error);
        statusEl.textContent = "불러오기 실패";
        errorEl.textContent = error.message;
      }
    }

    loadData();
  </script>
</body>
</html>
